{% extends "base.html" %}

{% block title %}Server Error | Expense Management System{% endblock %}

{% block content %}
<section class="glass-panel empty-state error-card">
    <p class="eyebrow">500</p>
    <h1>Something went wrong on the server.</h1>
    <p>Please try again in a moment. The application safely rolled back the failed transaction.</p>
    <a href="{{ url_for('dashboard' if current_user.is_authenticated else 'login') }}" class="btn btn-primary btn-hero">Return</a>
</section>
{% endblock %}
